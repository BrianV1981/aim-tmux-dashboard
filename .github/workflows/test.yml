name: A.I.M. Test Suite

on:
  push:
    branches: [ main, dev-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install system dependencies for keyring
      run: sudo apt-get update && sudo apt-get install -y dbus-x11 pkg-config libdbus-1-dev
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run unit tests
      env:
        PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
      run: |
        pytest tests/ -v