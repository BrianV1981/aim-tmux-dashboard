name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Syntax check
      run: |
        python -m py_compile bin/dashboard.py
        
    - name: Install tmux (for tests)
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux
        
    - name: Run UI Pilot Test
      run: |
        # test_ui.py is gitignored, but if it exists or we add it later this runs it.
        # Alternatively, we just check if it imports cleanly.
        python -c "import importlib.util; s=importlib.util.spec_from_file_location('d','bin/dashboard.py'); m=importlib.util.module_from_spec(s); s.loader.exec_module(m)"